name: Run tests

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Install dependencies
      run: |
        cd src
        echo "Install deps"
        uv sync
    - name: Prepare DB
      run: |
        cd src

        echo "Create DB"
        sudo touch db.sqlite3
        sudo chmod -R 777 db.sqlite3

        echo "Create .env"
        echo -e "${{ secrets.ENV }}" > .env

        echo "Init DB"
        uv run python3 test_db_init.py || true
        uv run python3 test_db_init.py
    
    - name: Run tests
      run: |
        cd src
        uv run -m pytest \
          --junitxml=pytest.xml \
          --cov-report=term-missing \
          --cov=app tests/ | tee pytest-coverage.txt

    - name: Coverage comment
      id: coverage
      uses: MishaKav/pytest-coverage-comment@v1
      with:
        pytest-coverage-path: ./src/pytest-coverage.txt
        junitxml-path: ./src/pytest.xml